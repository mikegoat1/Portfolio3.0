<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" role="img" aria-label="Evergreen Grounds — custom WordPress block theme">
  <defs>
    <linearGradient id="eg-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="480" height="270" fill="url(#eg-bg)"/>
  <rect x="0.5" y="0.5" width="479" height="269" fill="none" stroke="#3fb950" stroke-opacity="0.18"/>

  <!-- Faint terminal prompt, top-left -->
  <text x="28" y="42" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#58a6ff" opacity="0.75">$ wp theme activate</text>
  <text x="28" y="60" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#3fb950" opacity="0.6">evergreen-grounds</text>

  <!-- Leaf mark -->
  <g transform="translate(240 128)">
    <circle r="46" fill="#3fb950" fill-opacity="0.08" stroke="#3fb950" stroke-opacity="0.35"/>
    <!-- Simple two-lobe leaf built from quadratic curves -->
    <path d="M0 26 C -26 8 -26 -20 0 -30 C 26 -20 26 8 0 26 Z" fill="#3fb950"/>
    <!-- Central vein -->
    <path d="M0 22 L0 -26" stroke="#0d1117" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Side veins -->
    <path d="M0 4 L -13 -6 M0 4 L 13 -6 M0 -8 L -10 -16 M0 -8 L 10 -16" stroke="#0d1117" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="240" y="212" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif" font-size="26" font-weight="700" fill="#c9d1d9">Evergreen Grounds</text>

  <!-- Subtitle -->
  <text x="240" y="236" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" letter-spacing="1.5" fill="#8b949e">WORDPRESS · BLOCK THEME · theme.json</text>
</svg>
